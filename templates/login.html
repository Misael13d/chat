<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chat Local</title>
    <style>
        body {
            font-family: Arial;
            max-width: 400px;
            margin: 80px auto;
            padding: 20px;
            text-align: center;
        }
        input[type="password"] {
            padding: 10px;
            width: 100%;
            margin: 10px 0;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .error {
            color: red;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h2>Acceso al chat</h2>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post">
        <input type="password" name="texto" placeholder="Contraseña" autofocus required>
        <br>
        <button type="submit">Entrar</button>
    </form>
</body>
</html>
